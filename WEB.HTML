<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("https://i.ibb.co/RpFKQSv0/firefly-honkai-star-7680x4320-21360.jpg");
            background-size: cover;        /* Full screen */
            background-repeat: no-repeat;  /* No repeat */
            background-position: center;   /* Center image */
        }

        .container {
            display: flex;
            width: 800px;
            height: 400px;
            margin: 400px auto;
            box-shadow: 0 0 200px rgb(142, 142, 231);
            background: rgba(204, 182, 238, 0.432);
            border-radius: 25px;
            overflow: clip;
        }

        .image-side {
            width: 45%;
            background: url('https://i.ibb.co/fV7GyWw6/file.jpg') no-repeat center;
            background-size: cover;
        }

        .login-side {
            width: 40%;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #000000;
        }

        button {
            width: 110%;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: rgb(0, 0, 0);
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-side"></div>

    <div class="login-side">
        <h2>Login</h2>
        <form action="welcome.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
