<!DOCTYPE html>
<html>
<head>
    <title>Centered Buttons</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .button-container {
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            color: white;
            background: #ff7eb3;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: #f81008;
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="https://wa.me/94740449539" target="_blank">
  <button class="btn">WhatsApp</button>
</a>
        <a href="https://whatsapp.com/channel/0029Vb7yp4y8PgsEq4YuWW1q" target="_blank">
  <button class="btn">WhatsApp Channel</button>
</a>
       <a href="https://chat.whatsapp.com/XXXXXXXXXXXX" target="_blank" class="btn">
  WhatsApp Group
</a>
        <a href="https://www.facebook.com/anuwh2010" target="_blank" class="btn">
  Facebook
</a>
    </div>

</body>
</html>
